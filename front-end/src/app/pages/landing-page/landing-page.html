<div class="landing-page">
  <header class="navbar">
    <div class="navbar_inner">
      <a class="navbar_brand" href="#hero">
        <svg
          class="navbar_radar-icon"
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M19.07 4.93A10 10 0 0 0 6.99 3.34" />
          <path d="M4 6h.01" />
          <path d="M2.29 9.62A10 10 0 1 0 21.31 8.35" />
          <path d="M16.24 7.76A6 6 0 1 0 8.23 16.67" />
          <path d="M12 18h.01" />
          <path d="M17.99 11.66A6 6 0 0 1 15.77 16.67" />
          <circle cx="12" cy="12" r="2" />
          <path d="m13.41 10.59 5.66-5.66" />
        </svg>
        <span class="navbar_brand-name">SPACE RADAR</span>
      </a>

      <button
        class="navbar_toggle"
        (click)="toggleMenu()"
        [attr.aria-expanded]="isMenuOpen"
        aria-label="Toggle navigation"
      >
        @if (!isMenuOpen) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        }
      </button>

      <div class="navbar_links" [class.navbar_links--open]="isMenuOpen">
        <a href="#features" class="navbar_link" (click)="closeMenu()">Features</a>
        <a href="#architecture" class="navbar_link" (click)="closeMenu()">Architecture</a>
        <a href="#classification" class="navbar_link" (click)="closeMenu()">Classification</a>
        <a href="#stack" class="navbar_link" (click)="closeMenu()">Stack</a>
      </div>
    </div>
  </header>

  <app-hero-section />
  <app-features-section />
  <app-architecture-section />
  <app-threat-levels />
  <app-tech-stack />
  <app-footer />
</div>
